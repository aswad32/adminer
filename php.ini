; PHP configuration for Vercel deployment
; Read by the vercel-php runtime at build time

; Error handling — suppress output in production
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Sessions
session.gc_maxlifetime = 3600
session.cookie_httponly = 1
session.cookie_samesite = Strict
; Note: Vercel serverless functions are stateless. Sessions are file-based
; and scoped to a single function instance. Under concurrent load, users
; may be required to log in again. For persistent sessions across instances,
; configure a custom session handler (e.g. Redis, database).

; Upload limits (relevant for the Import screen)
upload_max_filesize = 16M
post_max_size = 16M

; Execution limits
max_execution_time = 30
memory_limit = 128M

; Timezone
date.timezone = UTC
